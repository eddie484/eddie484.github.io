<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Content Manager</title>
  <style>
    #nc-root {
      --cms-writing-max-width: min(1280px, calc(100vw - 96px));
      --cms-writing-min-height: clamp(540px, 70vh, 960px);
    }

    #nc-root .content-editor .content-area,
    #nc-root .content-editor [data-cms-edit-container='true'],
    #nc-root .content-editor .pane[data-mode='edit'] {
      width: 100% !important;
      max-width: none !important;
      flex: 1 1 auto !important;
    }

    #nc-root .content-editor .content-area > *:has(.pane[data-mode='preview']) > *:has(.pane[data-mode='edit']) {
      width: 100% !important;
      min-width: 0 !important;
      max-width: none !important;
      flex: 1 1 100% !important;
    }

    #nc-root .content-editor .content-area > *:has(.pane[data-mode='preview']) > *:not(:has(.pane[data-mode='edit'])) {
      display: none !important;
      width: 0 !important;
      min-width: 0 !important;
      max-width: 0 !important;
      flex: 0 0 0 !important;
      overflow: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #nc-root .content-editor .sui.resizable-pane:has(.pane[data-mode='edit']),
    #nc-root .content-editor [data-cms-edit-container='true'] {
      width: 100% !important;
      min-width: 0 !important;
      max-width: none !important;
      flex: 1 1 100% !important;
    }

    #nc-root .content-editor .sui.resizable-pane:has(.pane[data-mode='preview']),
    #nc-root .content-editor .pane[data-mode='preview'],
    #nc-root .content-editor .sui.resizable-handle,
    #nc-root .content-editor [data-cms-preview-container='true'],
    #nc-root .content-editor [data-cms-resize-handle='true'] {
      display: none !important;
      width: 0 !important;
      min-width: 0 !important;
      max-width: 0 !important;
      flex: 0 0 0 !important;
      overflow: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #nc-root .content-editor .pane[data-mode='edit'] {
      margin-inline: auto !important;
    }

    #nc-root .content-editor .pane[data-mode='edit'] > * {
      width: min(100%, var(--cms-writing-max-width)) !important;
      margin-inline: auto !important;
    }

    #nc-root .content-editor .field[data-key-path='body'] {
      width: min(100%, var(--cms-writing-max-width)) !important;
      margin: clamp(24px, 4vw, 52px) auto !important;
      padding: clamp(16px, 2.5vw, 28px) !important;
      border: 1px solid color-mix(in srgb, var(--sui-primary-border-color, #d4d8dd), transparent 10%) !important;
      border-radius: 18px !important;
      background: var(--sui-content-background-color, #fff) !important;
      box-shadow: 0 22px 70px rgb(15 23 42 / 10%) !important;
      box-sizing: border-box !important;
    }

    #nc-root .content-editor .field[data-key-path='body'],
    #nc-root .content-editor .field[data-key-path='body'] * {
      box-sizing: border-box !important;
    }

    #nc-root .content-editor .field[data-key-path='body'] .field-wrapper,
    #nc-root .content-editor .field[data-key-path='body'] .sui.text-editor,
    #nc-root .content-editor .field[data-key-path='body'] .lexical-root,
    #nc-root .content-editor .field[data-key-path='body'] textarea,
    #nc-root .content-editor .field[data-key-path='body'] [role='textbox'] {
      width: 100% !important;
      max-width: none !important;
      min-height: var(--cms-writing-min-height) !important;
    }

    #nc-root .content-editor .field[data-key-path='body'] .sui.toolbar {
      position: sticky !important;
      top: 0 !important;
      z-index: 20 !important;
      border-radius: 12px 12px 0 0 !important;
    }

    #nc-root .content-editor .field[data-key-path='body'] .lexical-root,
    #nc-root .content-editor .field[data-key-path='body'] textarea,
    #nc-root .content-editor .field[data-key-path='body'] [role='textbox'] {
      padding: clamp(18px, 2.5vw, 34px) !important;
      font-size: 17px !important;
      line-height: 1.85 !important;
    }

    @media (width < 760px) {
      #nc-root {
        --cms-writing-max-width: 100%;
        --cms-writing-min-height: 62vh;
      }

      #nc-root .content-editor .field[data-key-path='body'] {
        margin-block: 18px !important;
        padding: 12px !important;
        border-radius: 12px !important;
        box-shadow: none !important;
      }
    }
  </style>
</head>
<body>
  <script>
    (() => {
      let scheduled = false;

      function paneContainer(pane) {
        return pane.closest('.sui.resizable-pane') || pane.parentElement?.parentElement || null;
      }

      function markEditorLayout() {
        scheduled = false;

        const editor = document.querySelector('#nc-root .content-editor');

        if (!editor) {
          return;
        }

        editor.querySelectorAll('.pane[data-mode="edit"]').forEach((pane) => {
          paneContainer(pane)?.setAttribute('data-cms-edit-container', 'true');
        });

        editor.querySelectorAll('.pane[data-mode="preview"]').forEach((pane) => {
          paneContainer(pane)?.setAttribute('data-cms-preview-container', 'true');
        });

        editor.querySelectorAll('.sui.resizable-handle').forEach((handle) => {
          handle.setAttribute('data-cms-resize-handle', 'true');
        });
      }

      function scheduleMarking() {
        if (scheduled) {
          return;
        }

        scheduled = true;
        requestAnimationFrame(markEditorLayout);
      }

      new MutationObserver(scheduleMarking).observe(document.documentElement, {
        attributes: true,
        childList: true,
        subtree: true,
      });

      window.addEventListener('hashchange', scheduleMarking);
      window.addEventListener('load', scheduleMarking);
      scheduleMarking();
      window.setInterval(scheduleMarking, 500);
    })();
  </script>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
