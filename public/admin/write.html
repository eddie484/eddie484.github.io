<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글쓰기 - 기록 공간</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #7b818a;
      --line: #e5e7eb;
      --line-strong: #d5d9df;
      --paper: #ffffff;
      --surface: #f6f7f8;
      --accent: #0f8f54;
      --accent-strong: #06733f;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: #f4f5f6;
      color: var(--ink);
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto minmax(180px, 1fr);
      align-items: center;
      gap: 16px;
      min-height: 64px;
      padding: 10px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--ink);
      font-size: 17px;
      font-weight: 800;
      text-decoration: none;
    }

    .brand-mark {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 50%;
      background: var(--ink);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    .meta-strip {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .meta-strip select,
    .meta-strip input {
      height: 36px;
      border: 1px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
    }

    .meta-strip select {
      width: 132px;
      padding: 0 28px 0 8px;
      cursor: pointer;
    }

    .meta-strip input {
      width: 220px;
      padding: 0 8px;
    }

    .meta-strip select:hover,
    .meta-strip input:hover,
    .meta-strip select:focus,
    .meta-strip input:focus {
      border-color: var(--line-strong);
      background: #fff;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .status {
      max-width: 280px;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .action {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .action:hover {
      border-color: #b8bec7;
      background: #f9fafb;
    }

    .action.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .action.primary:hover {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
    }

    .stage {
      min-height: calc(100vh - 64px);
      padding: 52px max(28px, calc((100vw - 860px) / 2)) 80px;
    }

    .paper {
      width: min(100%, 860px);
      margin: 0 auto;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .paper-inner {
      padding: clamp(36px, 6vw, 76px) min(80px, max(22px, calc((100vw - 700px) / 2))) 72px;
    }

    .title-input,
    .summary-input,
    .body-input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      overflow: hidden;
      resize: none;
    }

    .title-input {
      min-height: 82px;
      padding: 0 0 24px;
      border-bottom: 1px solid var(--line);
      font-size: 32px;
      font-weight: 500;
      line-height: 1.5;
    }

    .title-input::placeholder {
      color: #a2a7ae;
    }

    .summary-input {
      min-height: 48px;
      margin-top: 26px;
      color: #5e6570;
      font-size: 18px;
      line-height: 1.7;
    }

    .summary-input::placeholder,
    .body-input::placeholder {
      color: #a7adb5;
    }

    .body-shell {
      margin-top: 42px;
    }

    .body-tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      padding: 8px 0 12px;
      border-bottom: 1px solid var(--line);
    }

    .tool {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #4d535b;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
    }

    .tool:hover,
    .tool:focus-visible {
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }

    .divider {
      width: 1px;
      height: 20px;
      margin: 0 6px;
      background: var(--line);
    }

    .body-input {
      min-height: max(62vh, 620px);
      padding: 28px 0 0;
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        system-ui,
        sans-serif;
      font-size: 15px;
      line-height: 1.8;
    }

    .body-input:focus {
      caret-color: var(--accent);
    }

    @media (max-width: 780px) {
      .topbar {
        grid-template-columns: 1fr;
        align-items: stretch;
        padding: 12px 16px;
      }

      .meta-strip,
      .actions {
        justify-content: flex-start;
      }

      .meta-strip {
        flex-wrap: wrap;
      }

      .meta-strip select,
      .meta-strip input {
        width: 100%;
        border-color: var(--line);
        background: #fff;
      }

      .actions {
        flex-wrap: wrap;
      }

      .status {
        order: 3;
        width: 100%;
        max-width: none;
      }

      .stage {
        padding: 18px 0 48px;
      }

      .paper {
        box-shadow: none;
      }

      .paper-inner {
        padding: 30px 22px 56px;
      }

      .title-input {
        font-size: 32px;
      }

      .body-input {
        min-height: 68vh;
        font-size: 15px;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/blog/" aria-label="블로그로 돌아가기">
      <span class="brand-mark">기</span>
      <span>기록 공간</span>
    </a>

    <div class="meta-strip" aria-label="글 설정">
      <select id="category" aria-label="카테고리">
        <option value="" disabled selected>카테고리 불러오는 중…</option>
      </select>
      <input id="pubDate" type="datetime-local" aria-label="게시일" />
    </div>

    <div class="actions">
      <span id="status" class="status" role="status" aria-live="polite"></span>
      <button id="saveDraft" class="action" type="button">초안 저장</button>
      <button id="sendToCms" class="action primary" type="button">발행하기</button>
    </div>
  </header>

  <main class="stage">
    <article class="paper">
      <div class="paper-inner">
        <textarea id="title" class="title-input" rows="1" placeholder="제목" aria-label="제목"></textarea>
        <textarea id="description" class="summary-input" rows="2" placeholder="짧은 요약을 적어주세요." aria-label="요약"></textarea>

        <section class="body-shell" aria-label="본문">
          <div class="body-tools">
            <button class="tool" type="button" data-insert="## " title="소제목" aria-label="소제목">H</button>
            <button class="tool" type="button" data-wrap="**" title="굵게" aria-label="굵게">B</button>
            <button class="tool" type="button" data-wrap="*" title="기울임" aria-label="기울임">I</button>
            <span class="divider" aria-hidden="true"></span>
            <button class="tool" type="button" data-insert="> " title="인용" aria-label="인용">"</button>
            <button class="tool" type="button" data-template="[링크](https://)" title="링크" aria-label="링크">↗</button>
            <button class="tool" type="button" data-template="![이미지 설명](/uploads/)" title="이미지" aria-label="이미지">□</button>
          </div>
          <textarea id="body" class="body-input" placeholder="본문을 쓰세요." aria-label="본문"></textarea>
        </section>
      </div>
    </article>
  </main>

  <script>
    (() => {
      const DRAFT_KEY = 'blog-writer:draft';
      const fields = {
        title: document.querySelector('#title'),
        description: document.querySelector('#description'),
        category: document.querySelector('#category'),
        pubDate: document.querySelector('#pubDate'),
        body: document.querySelector('#body'),
        status: document.querySelector('#status'),
      };

      const toLocalDateTime = (date = new Date()) => {
        const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return local.toISOString().slice(0, 16);
      };

      const resizeTextarea = (textarea) => {
        if (!textarea) return;
        // 높이를 auto로 접는 순간 문서가 짧아져 스크롤이 문서 끝으로
        // 클램프되는 것을 막기 위해 스크롤 위치를 보존한다.
        const { scrollX, scrollY } = window;
        textarea.style.height = 'auto';
        textarea.style.height = `${textarea.scrollHeight}px`;
        window.scrollTo(scrollX, scrollY);
      };

      const caretMirror = document.createElement('div');
      Object.assign(caretMirror.style, {
        position: 'absolute',
        top: '0',
        left: '-9999px',
        visibility: 'hidden',
        whiteSpace: 'pre-wrap',
        overflowWrap: 'break-word',
      });
      caretMirror.setAttribute('aria-hidden', 'true');
      document.body.appendChild(caretMirror);

      const getCaretTop = (textarea) => {
        const style = window.getComputedStyle(textarea);
        [
          'fontFamily', 'fontSize', 'fontWeight', 'letterSpacing', 'lineHeight',
          'paddingTop', 'paddingRight', 'paddingBottom', 'paddingLeft', 'boxSizing',
        ].forEach((prop) => {
          caretMirror.style[prop] = style[prop];
        });
        caretMirror.style.width = `${textarea.clientWidth}px`;
        caretMirror.textContent = textarea.value.slice(0, textarea.selectionEnd);

        const marker = document.createElement('span');
        marker.textContent = '\u200b';
        caretMirror.appendChild(marker);

        return textarea.getBoundingClientRect().top + marker.offsetTop;
      };

      const keepCaretComfortable = (textarea) => {
        const caretTop = getCaretTop(textarea);
        const lineHeight = parseFloat(window.getComputedStyle(textarea).lineHeight) || 27;
        const bottomGap = Math.min(200, window.innerHeight * 0.28);
        const topGap = 96;

        const overflow = caretTop + lineHeight - (window.innerHeight - bottomGap);
        if (overflow > 0) {
          window.scrollBy(0, overflow);
        } else if (caretTop < topGap) {
          window.scrollBy(0, caretTop - topGap);
        }
      };

      const setStatus = (message) => {
        fields.status.textContent = message;
      };

      const getPayload = () => ({
        title: fields.title.value.trim(),
        description: fields.description.value.trim(),
        category: fields.category.value,
        pubDate: fields.pubDate.value || toLocalDateTime(),
        body: fields.body.value.trimEnd(),
      });

      const getCmsUrl = (payload) => {
        const params = new URLSearchParams();

        ['title', 'description', 'category', 'pubDate', 'body'].forEach((key) => {
          params.set(key, payload[key] || '');
        });

        const url = new URL('/admin/', window.location.origin);
        url.hash = `/collections/blog/new?${params.toString()}`;

        return url.toString();
      };

      const saveDraft = (silent = false) => {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(getPayload()));
        if (!silent) setStatus('초안을 저장했습니다.');
      };

      const loadDraft = () => {
        const saved = localStorage.getItem(DRAFT_KEY);
        if (!saved) return;

        try {
          const draft = JSON.parse(saved);
          fields.title.value = draft.title || '';
          fields.description.value = draft.description || '';
          fields.pubDate.value = draft.pubDate || toLocalDateTime();
          fields.body.value = draft.body || '';
        } catch {
          localStorage.removeItem(DRAFT_KEY);
        }
      };

      const getDraftCategory = () => {
        try {
          return JSON.parse(localStorage.getItem(DRAFT_KEY))?.category || '';
        } catch {
          return '';
        }
      };

      // 카테고리 목록은 /categories.json(원본: src/data/categories.json)에서 가져온다.
      const loadCategories = async () => {
        try {
          const response = await fetch('/categories.json');
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const { categories } = await response.json();

          const byId = new Map();
          const roots = [];
          categories.forEach((entry) => {
            if (entry.type !== 'category') return;
            const node = { ...entry, children: [] };
            byId.set(node.id, node);
            const parent = entry.parent && byId.get(entry.parent);
            (parent ? parent.children : roots).push(node);
          });

          fields.category.innerHTML = '';
          const appendOptions = (nodes, depth) => {
            nodes.forEach((node) => {
              const option = document.createElement('option');
              option.value = node.id;
              option.textContent = '— '.repeat(depth) + node.label;
              fields.category.appendChild(option);
              appendOptions(node.children, depth + 1);
            });
          };
          appendOptions(roots, 0);

          const desired = getDraftCategory() || 'journal';
          if (byId.has(desired)) fields.category.value = desired;
        } catch {
          setStatus('카테고리 목록을 불러오지 못했습니다. 새로고침 해주세요.');
        }
      };

      const insertMarkdown = (textarea, options) => {
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selected = textarea.value.slice(start, end);
        let next = '';
        let caret = start;

        if (options.insert) {
          next = options.insert + selected;
          caret = start + next.length;
        }

        if (options.wrap) {
          next = `${options.wrap}${selected || '텍스트'}${options.wrap}`;
          caret = selected ? start + next.length : start + options.wrap.length + 3;
        }

        if (options.template) {
          next = selected ? options.template.replace('링크', selected).replace('이미지 설명', selected) : options.template;
          caret = start + next.length;
        }

        textarea.setRangeText(next, start, end, 'end');
        textarea.focus();
        textarea.selectionStart = caret;
        textarea.selectionEnd = caret;
        resizeTextarea(textarea);
        keepCaretComfortable(textarea);
        saveDraft(true);
      };

      let draftTimer = 0;
      const scheduleDraft = () => {
        clearTimeout(draftTimer);
        draftTimer = setTimeout(() => {
          saveDraft(true);
          setStatus('자동 저장됨');
        }, 500);
      };

      loadDraft();
      loadCategories();
      if (!fields.pubDate.value) fields.pubDate.value = toLocalDateTime();
      resizeTextarea(fields.title);
      resizeTextarea(fields.description);
      resizeTextarea(fields.body);

      [fields.title, fields.description, fields.body].forEach((field) => {
        field.addEventListener('input', () => {
          resizeTextarea(field);
          if (field === fields.body) keepCaretComfortable(field);
          scheduleDraft();
        });
      });

      [fields.category, fields.pubDate].forEach((field) => {
        field.addEventListener('change', scheduleDraft);
      });

      document.querySelector('#saveDraft').addEventListener('click', () => saveDraft(false));

      document.querySelectorAll('[data-insert], [data-wrap], [data-template]').forEach((button) => {
        button.addEventListener('click', () => {
          insertMarkdown(fields.body, {
            insert: button.dataset.insert,
            wrap: button.dataset.wrap,
            template: button.dataset.template,
          });
        });
      });

      document.querySelector('#sendToCms').addEventListener('click', () => {
        const payload = getPayload();

        if (!payload.title) {
          fields.title.focus();
          setStatus('제목을 입력해주세요.');
          return;
        }

        if (!payload.category) {
          setStatus('카테고리가 로드되지 않았습니다. 새로고침 후 다시 시도해주세요.');
          return;
        }

        if (!payload.description) {
          payload.description = payload.body.replace(/[#>*_`[\]()!-]/g, '').trim().slice(0, 120) || payload.title;
          fields.description.value = payload.description;
          resizeTextarea(fields.description);
        }

        localStorage.setItem(DRAFT_KEY, JSON.stringify(payload));
        setStatus('CMS로 보내는 중입니다.');
        window.location.href = getCmsUrl(payload);
      });
    })();
  </script>
</body>
</html>
