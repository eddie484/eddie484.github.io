<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글쓰기 - 기록 공간</title>
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css" />
  <script src="https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js"></script>
  <script src="https://uicdn.toast.com/editor/3.2.2/i18n/ko-kr.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #7b818a;
      --line: #e5e7eb;
      --line-strong: #d5d9df;
      --paper: #ffffff;
      --surface: #f6f7f8;
      --accent: #0f8f54;
      --accent-strong: #06733f;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: #f4f5f6;
      color: var(--ink);
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto minmax(180px, 1fr);
      align-items: center;
      gap: 16px;
      min-height: 64px;
      padding: 10px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--ink);
      font-size: 17px;
      font-weight: 800;
      text-decoration: none;
    }

    .brand-mark {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 50%;
      background: var(--ink);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    .meta-strip {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .meta-strip select,
    .meta-strip input {
      height: 36px;
      border: 1px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
    }

    .meta-strip select {
      width: 132px;
      padding: 0 28px 0 8px;
      cursor: pointer;
    }

    .meta-strip input {
      width: 220px;
      padding: 0 8px;
    }

    .meta-strip select:hover,
    .meta-strip input:hover,
    .meta-strip select:focus,
    .meta-strip input:focus {
      border-color: var(--line-strong);
      background: #fff;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .status {
      max-width: 280px;
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .action {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .action:hover {
      border-color: #b8bec7;
      background: #f9fafb;
    }

    .action.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .action.primary:hover {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
    }

    .stage {
      min-height: calc(100vh - 64px);
      padding: 52px max(28px, calc((100vw - 860px) / 2)) 80px;
    }

    .paper {
      width: min(100%, 860px);
      margin: 0 auto;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .paper-inner {
      padding: clamp(36px, 6vw, 76px) min(80px, max(22px, calc((100vw - 700px) / 2))) 72px;
    }

    .title-input,
    .summary-input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      overflow: hidden;
      resize: none;
    }

    .title-input {
      min-height: 82px;
      padding: 0 0 24px;
      border-bottom: 1px solid var(--line);
      font-size: 32px;
      font-weight: 500;
      line-height: 1.5;
    }

    .title-input::placeholder {
      color: #a2a7ae;
    }

    .summary-input {
      min-height: 48px;
      margin-top: 26px;
      color: #5e6570;
      font-size: 18px;
      line-height: 1.7;
    }

    .summary-input::placeholder {
      color: #a7adb5;
    }

    .body-shell {
      margin-top: 42px;
    }

    .body-editor {
      min-height: max(62vh, 620px);
      padding-top: 0;
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        system-ui,
        sans-serif;
      font-size: 15px;
      line-height: 1.8;
    }

    .body-editor .toastui-editor-defaultUI {
      border: 0;
      font-family: inherit;
    }

    .body-editor .toastui-editor-defaultUI-toolbar {
      padding: 8px 0 12px;
      border-bottom: 1px solid var(--line);
      background: transparent;
    }

    .body-editor .toastui-editor-main {
      border: 0;
    }

    .body-editor .toastui-editor-md-container,
    .body-editor .toastui-editor-ww-container {
      background: transparent;
    }

    .body-editor .toastui-editor-contents,
    .body-editor .toastui-editor-md-container .toastui-editor {
      font-family: inherit;
      font-size: 15px;
      line-height: 1.8;
    }

    .body-editor .ProseMirror {
      caret-color: var(--accent);
    }

    .body-fallback {
      width: 100%;
      min-height: max(62vh, 620px);
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      overflow: hidden;
      resize: none;
      font-family:
        "Pretendard",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        system-ui,
        sans-serif;
      font-size: 15px;
      line-height: 1.8;
    }

    .body-fallback::placeholder {
      color: #a7adb5;
    }

    .body-fallback:focus {
      caret-color: var(--accent);
    }

    @media (max-width: 780px) {
      .topbar {
        grid-template-columns: 1fr;
        align-items: stretch;
        padding: 12px 16px;
      }

      .meta-strip,
      .actions {
        justify-content: flex-start;
      }

      .meta-strip {
        flex-wrap: wrap;
      }

      .meta-strip select,
      .meta-strip input {
        width: 100%;
        border-color: var(--line);
        background: #fff;
      }

      .actions {
        flex-wrap: wrap;
      }

      .status {
        order: 3;
        width: 100%;
        max-width: none;
      }

      .stage {
        padding: 18px 0 48px;
      }

      .paper {
        box-shadow: none;
      }

      .paper-inner {
        padding: 30px 22px 56px;
      }

      .title-input {
        font-size: 32px;
      }

      .body-editor {
        min-height: 68vh;
        font-size: 15px;
        line-height: 1.8;
      }

      .body-fallback {
        min-height: 68vh;
        font-size: 15px;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/blog/" aria-label="블로그로 돌아가기">
      <span class="brand-mark">기</span>
      <span>기록 공간</span>
    </a>

    <div class="meta-strip" aria-label="글 설정">
      <select id="category" aria-label="카테고리">
        <option value="projects">프로젝트</option>
        <option value="project-a">프로젝트 A</option>
        <option value="design">설계</option>
        <option value="notes" selected>잡설</option>
        <option value="games">게임</option>
        <option value="game-a">게임A</option>
        <option value="game-b">게임B</option>
        <option value="game-c">게임C</option>
        <option value="thoughts">잡생각</option>
        <option value="food">식사</option>
      </select>
      <input id="pubDate" type="datetime-local" aria-label="게시일" />
    </div>

    <div class="actions">
      <span id="status" class="status" role="status" aria-live="polite"></span>
      <button id="saveDraft" class="action" type="button">초안 저장</button>
      <button id="sendToCms" class="action primary" type="button">발행하기</button>
    </div>
  </header>

  <main class="stage">
    <article class="paper">
      <div class="paper-inner">
        <textarea id="title" class="title-input" rows="1" placeholder="제목" aria-label="제목"></textarea>
        <textarea id="description" class="summary-input" rows="2" placeholder="짧은 요약을 적어주세요." aria-label="요약"></textarea>

        <section class="body-shell" aria-label="본문">
          <div id="bodyEditor" class="body-editor"></div>
          <textarea
            id="body"
            class="body-fallback"
            hidden
            aria-hidden="true"
            placeholder="본문을 쓰세요."
            aria-label="본문"
          ></textarea>
        </section>
      </div>
    </article>
  </main>

  <script>
    (() => {
      const DRAFT_KEY = 'blog-writer:draft';
      const fields = {
        title: document.querySelector('#title'),
        description: document.querySelector('#description'),
        category: document.querySelector('#category'),
        pubDate: document.querySelector('#pubDate'),
        body: document.querySelector('#body'),
        bodyEditor: document.querySelector('#bodyEditor'),
        status: document.querySelector('#status'),
      };
      let editor;

      const toLocalDateTime = (date = new Date()) => {
        const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return local.toISOString().slice(0, 16);
      };

      const resizeTextarea = (textarea) => {
        if (!textarea) return;
        textarea.style.height = 'auto';
        textarea.style.height = `${textarea.scrollHeight}px`;
      };

      const setStatus = (message) => {
        fields.status.textContent = message;
      };

      const syncBodyField = () => {
        fields.body.value = editor ? editor.getMarkdown() : fields.body.value;
        return fields.body.value;
      };

      const getPayload = () => ({
        title: fields.title.value.trim(),
        description: fields.description.value.trim(),
        category: fields.category.value,
        pubDate: fields.pubDate.value || toLocalDateTime(),
        body: syncBodyField().trimEnd(),
      });

      const getCmsUrl = (payload) => {
        const params = new URLSearchParams();

        ['title', 'description', 'category', 'pubDate', 'body'].forEach((key) => {
          params.set(key, payload[key] || '');
        });

        const url = new URL('/admin/', window.location.origin);
        url.hash = `/collections/blog/new?${params.toString()}`;

        return url.toString();
      };

      const saveDraft = (silent = false) => {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(getPayload()));
        if (!silent) setStatus('초안을 저장했습니다.');
      };

      const loadDraft = () => {
        const saved = localStorage.getItem(DRAFT_KEY);
        if (!saved) return;

        try {
          const draft = JSON.parse(saved);
          fields.title.value = draft.title || '';
          fields.description.value = draft.description || '';
          fields.category.value = draft.category || 'notes';
          fields.pubDate.value = draft.pubDate || toLocalDateTime();
          fields.body.value = draft.body || '';
        } catch {
          localStorage.removeItem(DRAFT_KEY);
        }
      };

      let draftTimer = 0;
      const scheduleDraft = () => {
        clearTimeout(draftTimer);
        draftTimer = setTimeout(() => {
          saveDraft(true);
          setStatus('자동 저장됨');
        }, 500);
      };

      const showBodyFallback = () => {
        fields.bodyEditor.hidden = true;
        fields.body.hidden = false;
        fields.body.removeAttribute('aria-hidden');
        resizeTextarea(fields.body);
        fields.body.addEventListener('input', () => {
          resizeTextarea(fields.body);
          scheduleDraft();
        });
      };

      const initializeBodyEditor = () => {
        if (!window.toastui?.Editor) {
          showBodyFallback();
          return;
        }

        try {
          editor = new toastui.Editor({
            el: fields.bodyEditor,
            height: 'auto',
            minHeight: '620px',
            initialEditType: 'wysiwyg',
            previewStyle: 'vertical',
            initialValue: fields.body.value || '',
            placeholder: '본문을 쓰세요.',
            language: 'ko-KR',
            autofocus: false,
            usageStatistics: false,
          });

          editor.on('change', () => {
            syncBodyField();
            scheduleDraft();
          });
        } catch (error) {
          console.error(error);
          showBodyFallback();
        }
      };

      loadDraft();
      if (!fields.pubDate.value) fields.pubDate.value = toLocalDateTime();
      resizeTextarea(fields.title);
      resizeTextarea(fields.description);
      initializeBodyEditor();

      [fields.title, fields.description].forEach((field) => {
        field.addEventListener('input', () => {
          resizeTextarea(field);
          scheduleDraft();
        });
      });

      [fields.category, fields.pubDate].forEach((field) => {
        field.addEventListener('change', scheduleDraft);
      });

      document.querySelector('#saveDraft').addEventListener('click', () => saveDraft(false));

      document.querySelector('#sendToCms').addEventListener('click', () => {
        const payload = getPayload();

        if (!payload.title) {
          fields.title.focus();
          setStatus('제목을 입력해주세요.');
          return;
        }

        if (!payload.description) {
          payload.description = payload.body.replace(/[#>*_`[\]()!-]/g, '').trim().slice(0, 120) || payload.title;
          fields.description.value = payload.description;
          resizeTextarea(fields.description);
        }

        localStorage.setItem(DRAFT_KEY, JSON.stringify(payload));
        setStatus('CMS로 보내는 중입니다.');
        window.location.href = getCmsUrl(payload);
      });
    })();
  </script>
</body>
</html>
