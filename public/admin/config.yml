backend:
  name: github
  repo: eddie484/eddie484.github.io
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: settings
    label: 설정
    editor:
      preview: false
    files:
      - name: categories
        label: 카테고리 관리
        file: src/data/categories.json
        fields:
          - name: categories
            label: 카테고리 목록
            label_singular: 항목
            widget: list
            summary: '{{fields.label}}'
            types:
              - name: category
                label: 카테고리
                fields:
                  - name: id
                    label: ID
                    widget: string
                    hint: 영문 소문자·숫자·하이픈. URL과 글 연결에 쓰이므로 한번 정하면 바꾸지 않는 것을 권장
                  - name: label
                    label: 이름
                    widget: string
                  - name: labelEn
                    label: 이름(영문)
                    widget: string
                    required: false
                    hint: 영문 블로그에 표시할 이름. 비워두면 한글 이름을 그대로 사용
                  - name: icon
                    label: 아이콘
                    widget: select
                    options: [folder, document]
                    default: document
                  - name: parent
                    label: 상위 카테고리
                    widget: relation
                    collection: settings
                    file: categories
                    search_fields: ['categories.*.label', 'categories.*.id']
                    value_field: 'categories.*.id'
                    display_fields: ['categories.*.label']
                    required: false
                    hint: 비워두면 최상위 카테고리
              - name: divider
                label: 구분선

  # 한글 원본만 CMS에서 관리한다. 영문(src/content/blog/en)은 번역 워크플로가 PR로 생성한다.
  - name: blog
    label: Blog
    folder: src/content/blog/ko
    create: true
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: string }
      - name: category
        label: Category
        widget: relation
        collection: settings
        file: categories
        search_fields: ['categories.*.label', 'categories.*.id']
        value_field: 'categories.*.id'
        display_fields: ['categories.*.label']
      - { name: pubDate, label: Publish Date, widget: datetime }
      - { name: body, label: Body, widget: markdown }
